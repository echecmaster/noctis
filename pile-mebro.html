<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation Recharge Batteries Mutuelle</title>
    <style>
        body {
            background-color: #0a0a12;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            display: flex;
            gap: 60px;
            position: relative;
        }

        .battery-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* Animations de saut sur 12 secondes */
        #bro-wrapper {
            animation: jump-bro 12s ease-in-out infinite;
        }

        #moi-wrapper {
            animation: jump-moi 12s ease-in-out infinite;
        }

        .terminal {
            width: 34px;
            height: 14px;
            background: white;
            border-radius: 6px 6px 0 0;
            box-shadow: 0 -2px 10px rgba(255, 255, 255, 0.8);
            z-index: 2;
        }

        .battery {
            width: 100px;
            height: 160px;
            border: 4px solid white;
            border-radius: 12px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.6), inset 0 0 10px rgba(255, 255, 255, 0.3);
            overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .sign {
            color: white;
            font-size: 24px;
            font-weight: bold;
            line-height: 1;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
        }

        .text {
            color: white;
            font-size: 26px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.9);
        }

        .level {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 1;
            box-shadow: 0 -5px 20px inset rgba(0,0,0,0.2); 
        }

        /* Animations de niveau d'énergie */
        #bro-level {
            animation: level-bro 12s ease-in-out infinite;
        }

        #moi-level {
            animation: level-moi 12s ease-in-out infinite;
        }

        /* --- KEYFRAMES --- */

        /* Phase 1 : MOI saute sur BRO (0% à 50% du temps) */
        @keyframes jump-moi {
            0%, 5% { transform: translate(0, 0) rotate(0deg); z-index: 1; }
            10% { transform: translate(-84px, -250px) rotate(-15deg); z-index: 10; } /* En l'air */
            15%, 35% { transform: translate(-168px, -174px) rotate(0deg); z-index: 10; } /* Posé sur BRO */
            40% { transform: translate(-84px, -250px) rotate(15deg); z-index: 10; } /* Repart en l'air */
            45%, 100% { transform: translate(0, 0) rotate(0deg); z-index: 1; } /* Retour à sa place et y reste */
        }

        /* Phase 2 : BRO saute sur MOI (50% à 100% du temps) */
        @keyframes jump-bro {
            0%, 55% { transform: translate(0, 0) rotate(0deg); z-index: 1; } /* Reste à sa place pendant la phase 1 */
            60% { transform: translate(84px, -250px) rotate(15deg); z-index: 10; } /* En l'air */
            65%, 85% { transform: translate(168px, -174px) rotate(0deg); z-index: 10; } /* Posé sur MOI */
            90% { transform: translate(84px, -250px) rotate(-15deg); z-index: 10; } /* Repart en l'air */
            95%, 100% { transform: translate(0, 0) rotate(0deg); z-index: 1; } /* Retour à sa place */
        }

        /* Cycle d'énergie de MOI (Plein -> Vide -> Plein) */
        @keyframes level-moi {
            0%, 15% { height: 100%; background-color: #34c759; box-shadow: 0 0 30px #34c759; } /* Commence Plein */
            25%, 65% { height: 10%; background-color: #ff3b30; box-shadow: 0 0 30px #ff3b30; } /* Se vide pour BRO */
            75%, 100% { height: 100%; background-color: #34c759; box-shadow: 0 0 30px #34c759; } /* Est rechargé par BRO */
        }

        /* Cycle d'énergie de BRO (Vide -> Plein -> Vide) */
        @keyframes level-bro {
            0%, 15% { height: 10%; background-color: #ff3b30; box-shadow: 0 0 30px #ff3b30; } /* Commence Vide */
            25%, 65% { height: 100%; background-color: #34c759; box-shadow: 0 0 30px #34c759; } /* Est rechargé par MOI */
            75%, 100% { height: 10%; background-color: #ff3b30; box-shadow: 0 0 30px #ff3b30; } /* Se vide pour MOI */
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="battery-wrapper" id="bro-wrapper">
            <div class="terminal"></div>
            <div class="battery">
                <div class="level" id="bro-level"></div>
                <div class="content">
                    <span class="sign">+</span>
                    <span class="text">BRO</span>
                    <span class="sign">-</span>
                </div>
            </div>
        </div>

        <div class="battery-wrapper" id="moi-wrapper">
            <div class="terminal"></div>
            <div class="battery">
                <div class="level" id="moi-level"></div>
                <div class="content">
                    <span class="sign">+</span>
                    <span class="text">MOI</span>
                    <span class="sign">-</span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
