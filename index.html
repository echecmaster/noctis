<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu des Animations</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            margin-bottom: 50px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1000px;
        }

        .btn-link {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 2px 20px;
            text-align: center;
            text-decoration: none;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        /* Effets de survol (Hover) */
        .btn-link:hover {
            transform: translateY(-5px) scale(1.02);
            background: #222;
            border-color: #00d4ff;
            box-shadow: 0 10px 25px rgba(0, 212, 255, 0.3);
            color: #00d4ff;
        }

        /* Couleurs personnalisées au survol pour certains boutons */
        .btn-link.success:hover { border-color: #ffff00; color: #ffff00; box-shadow: 0 10px 25px rgba(255, 255, 0, 0.3); }
        .btn-link.danger:hover { border-color: #ff3b30; color: #ff3b30; box-shadow: 0 10px 25px rgba(255, 59, 48, 0.3); }
        .btn-link.purple:hover { border-color: #7b2cbf; color: #7b2cbf; box-shadow: 0 10px 25px rgba(123, 44, 191, 0.3); }
    </style>
</head>
<body>

    <h1>Mes Animations Interactives</h1>

    <div class="grid">
        <a href="m-d-verre.html" class="btn-link">💧 Motivation vs Discipline</a>
        <a href="pile-mebro.html" class="btn-link danger">🔋 Recharge Batterie (Bro/Moi)</a>
        <a href="stickman-course.html" class="btn-link">🏃 Stickman Course</a>
        <a href="stickman-montagne.html" class="btn-link success">⛰️ Stickman Montagne (Success)</a>
        <a href="stickman-pompe.html" class="btn-link">💪 Stickman Pompes</a>
        <a href="stickman-traction.html" class="btn-link">🏋️ Stickman Tractions</a>
        <a href="ball-terrain.html" class="btn-link">⚽ Course de Balles Stylée</a>
        <a href="barre-%.html" class="btn-link purple">📊 Dashboard Motivation</a>
        <a href="bouton.html" class="btn-link">🎛️ Boutons Switch (Argent/Amour)</a>
    </div>

</body>
</html>
