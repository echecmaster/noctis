<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Switchs interactifs</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0f0f0f;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .container {
    width: 320px;
    margin-top: 60px;
  }

  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 20px 0;
    font-size: 18px;
  }

  .text {
    width: 33%;
    text-align: left;
  }

  .emoji {
    width: 33%;
    text-align: center;
    font-size: 22px;
    transition: 0.3s;
  }

  .switch {
    width: 33%;
    display: flex;
    justify-content: flex-end;
  }

  /* Glow animations */
  @keyframes glowGreen {
    0%,100% { text-shadow: 0 0 5px #00ff88, 0 0 10px #00ff88; }
    50% { text-shadow: 0 0 15px #00ff88, 0 0 25px #00ff88; }
  }

  @keyframes glowRed {
    0%,100% { text-shadow: 0 0 5px #ff2a2a, 0 0 10px #ff2a2a; }
    50% { text-shadow: 0 0 15px #ff2a2a, 0 0 25px #ff2a2a; }
  }

  @keyframes glowBlue {
    0%,100% { text-shadow: 0 0 5px #3aa0ff, 0 0 10px #3aa0ff; }
    50% { text-shadow: 0 0 15px #3aa0ff, 0 0 25px #3aa0ff; }
  }

  .active.green { animation: glowGreen 1.2s infinite ease-in-out; }
  .active.red { animation: glowRed 1.2s infinite ease-in-out; }
  .active.blue { animation: glowBlue 1.2s infinite ease-in-out; }

  /* Switch style */
  .switch-inner {
    position: relative;
    width: 60px;
    height: 34px;
  }

  .switch-inner input { display: none; }

  .slider {
    position: absolute;
    cursor: pointer;
    background-color: #444;
    border-radius: 34px;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    transition: 0.4s;
    box-shadow: 0 0 5px rgba(255,255,255,0.2);
  }

  .slider:before {
    position: absolute;
    content: "";
    height: 26px;
    width: 26px;
    left: 4px;
    bottom: 4px;
    background-color: white;
    border-radius: 50%;
    transition: 0.4s;
  }

  input:checked + .slider {
    background-color: #ffd700;
    box-shadow: 0 0 15px #ffd700;
  }

  input:checked + .slider:before {
    transform: translateX(26px);
    box-shadow: 0 0 10px #ffd700;
  }

  .controls {
    margin-bottom: 40px;
    display: flex;
    gap: 20px;
  }

  .controls button {
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    background: #222;
    color: white;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="container">

  <div class="row">
    <div class="text">Argent</div>
    <div class="emoji" data-color="green">💵</div>
    <div class="switch">
      <label class="switch-inner">
        <input type="checkbox" data-id="0">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="row">
    <div class="text">Amour</div>
    <div class="emoji" data-color="red">❤️</div>
    <div class="switch">
      <label class="switch-inner">
        <input type="checkbox" data-id="1">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="row">
    <div class="text">Sommeil</div>
    <div class="emoji" data-color="blue">💤</div>
    <div class="switch">
      <label class="switch-inner">
        <input type="checkbox" data-id="2">
        <span class="slider"></span>
      </label>
    </div>
  </div>

</div>

<div class="controls">
  <button onclick="toggleSwitch(0)">Argent</button>
  <button onclick="toggleSwitch(1)">Amour</button>
  <button onclick="toggleSwitch(2)">Sommeil</button>
</div>

<script>
  const switches = document.querySelectorAll('input[type="checkbox"]');
  const emojis = document.querySelectorAll('.emoji');
  let activeOrder = [];

  function handleSwitch(sw, index) {
    const id = sw.dataset.id;
    const emoji = emojis[index];

    if (sw.checked) {
      activeOrder.push(id);
      emoji.classList.add('active', emoji.dataset.color);

      if (activeOrder.length > 2) {
        const first = activeOrder.shift();
        switches[first].checked = false;
        emojis[first].classList.remove('active', emojis[first].dataset.color);
      }
    } else {
      activeOrder = activeOrder.filter(i => i !== id);
      emoji.classList.remove('active', emoji.dataset.color);
    }
  }

  switches.forEach((sw, index) => {
    sw.addEventListener('change', () => handleSwitch(sw, index));
  });

  function toggleSwitch(index) {
    const sw = switches[index];
    sw.checked = !sw.checked;
    handleSwitch(sw, index);
  }
</script>

</body>
</html>
